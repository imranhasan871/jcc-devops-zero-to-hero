apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jcc-production
  namespace: argocd
  labels:
    environment: production
spec:
  project: jcc
  source:
    repoURL: https://github.com/imranhasan871/jcc-devops-zero-to-hero
    targetRevision: class-24
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: jcc-production
  # No automated syncPolicy — all production syncs are manual and deliberate.
  # Use: argocd app sync jcc-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
