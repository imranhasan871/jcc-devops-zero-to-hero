apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base references the existing k8s manifests already in the repo.
# Overlays (dev, production) extend this base — they never duplicate YAML.
resources:
  - ../../../k8s/backend/deployment.yaml
  - ../../../k8s/backend/service.yaml
  - ../../../k8s/backend/hpa.yaml
  - ../../../k8s/config/configmap.yaml
  - ../../../k8s/database/statefulset.yaml
  - ../../../k8s/database/service.yaml
  - ../../../k8s/database/pvc.yaml
