# Vault Agent Injector annotations for the backend Deployment.
# The sidecar injects secrets at /vault/secrets/ before the app starts.
# The pod YAML contains zero passwords, zero base64, zero secretKeyRef for DB credentials.
#
# How it works:
#   1. Mutating webhook intercepts the Pod creation request.
#   2. Vault Agent init container authenticates via the pod's ServiceAccount JWT.
#   3. Vault Agent writes the secret to an in-memory volume at /vault/secrets/.
#   4. The app sources /vault/secrets/db.env — never contacts Vault directly.
#   5. On rotation: vault kv patch secret/jcc/db db_password="newpass"
#      The Vault Agent sidecar picks it up and rewrites the file. Zero pod restarts.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jcc-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jcc
      tier: backend
  template:
    metadata:
      labels:
        app: jcc
        tier: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "jcc-backend"
        vault.hashicorp.com/agent-inject-secret-db.env: "secret/data/jcc/db"
        vault.hashicorp.com/agent-inject-template-db.env: |
          {{- with secret "secret/data/jcc/db" -}}
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          export DB_USER="{{ .Data.data.db_user }}"
          export DB_NAME="{{ .Data.data.db_name }}"
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "false"
    spec:
      serviceAccountName: jcc-backend
      containers:
        - name: backend
          image: ghcr.io/imranhasan871/jcc-devops-zero-to-hero/jcc-app:latest
          command: ["/bin/sh", "-c"]
          args:
            - "source /vault/secrets/db.env && node server.js"
          ports:
            - containerPort: 3001
