version: '3.9'

# Vault dev server for local development.
# Start: docker compose -f docker-compose.vault.yml up -d
# UI:    http://localhost:8200  (token: root)

services:
  vault:
    image: hashicorp/vault:1.16
    container_name: jcc-vault
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    volumes:
      - ./vault/config/vault-dev.hcl:/vault/config/vault-dev.hcl:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  vault_data:
