apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcc-backend
  namespace: jcc-production
  labels:
    app: jcc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jcc-backend
  template:
    metadata:
      labels:
        app: jcc-backend
    spec:
      containers:
        - name: jcc-backend
          image: jcc-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
