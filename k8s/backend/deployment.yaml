apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jcc-production
  labels:
    app: jcc-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jcc-backend
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: jcc-backend
        tier: backend
    spec:
      serviceAccountName: jcc-backend
      automountServiceAccountToken: true
      priorityClassName: jcc-critical
      containers:
        - name: backend
          image: jcc-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "database-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-password
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: jcc-config
                  key: frontend-url
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
