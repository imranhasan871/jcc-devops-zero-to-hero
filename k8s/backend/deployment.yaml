apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jcc
  labels:
    app: jcc
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jcc
      tier: backend
  template:
    metadata:
      labels:
        app: jcc
        tier: backend
    spec:
      containers:
        - name: backend
          image: jcc-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "database-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jcc-db-secret
                  key: db-password
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: jcc-config
                  key: frontend-url
          # Readiness probe: pod receives traffic ONLY when this passes.
          # If it fails, the pod is removed from the Service endpoints — no traffic sent.
          # Use for: waiting for DB connections, warming up caches, startup initialization.
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10   # wait 10s after container start before first check
            periodSeconds: 5          # check every 5 seconds
            failureThreshold: 3       # fail 3 times in a row before marking not-ready
            successThreshold: 1       # 1 success to mark ready again
          # Liveness probe: if this fails, Kubernetes RESTARTS the container.
          # Use for: detecting deadlocks, hung processes, OOM-killed goroutines.
          # Never make it stricter than readiness — a failing liveness causes a restart loop.
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30   # give the app time to start before we ever check
            periodSeconds: 10         # check every 10 seconds
            failureThreshold: 3       # 3 consecutive failures → restart
          # Startup probe: for slow-starting containers, blocks liveness/readiness
          # until the app has had enough time to initialize.
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 30      # allows up to 30 * 10s = 5 minutes to start
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
