apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: jcc
  labels:
    app: jcc
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # scale up when average CPU across pods exceeds 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # wait 60s before scaling up again
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60            # add at most 1 pod per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 minutes before scaling down (avoid flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120           # remove at most 1 pod every 2 minutes
