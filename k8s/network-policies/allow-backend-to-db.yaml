# Allow backend pods to reach PostgreSQL on port 5432.
# This policy targets the database pod (podSelector on the outer spec)
# and restricts who can send ingress to it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-db
  namespace: jcc-production
spec:
  podSelector:
    matchLabels:
      app: jcc-database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: jcc-backend
      ports:
        - protocol: TCP
          port: 5432
