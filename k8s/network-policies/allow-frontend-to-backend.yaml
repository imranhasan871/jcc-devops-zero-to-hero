# Allow frontend pods to reach the backend API on port 3001.
# The podSelector on 'from' ensures only pods labelled app=jcc-frontend
# can initiate connections — not any other pod that happens to be in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: jcc-production
spec:
  podSelector:
    matchLabels:
      app: jcc-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: jcc-frontend
      ports:
        - protocol: TCP
          port: 3001
