# WARNING: This file contains BASE64-ENCODED placeholder values only.
# NEVER commit real passwords or secrets to git — not even base64-encoded ones.
# base64 is NOT encryption. Anyone with access to this file can decode it with:
#   echo "dmFsdWU=" | base64 --decode
#
# In production, use one of:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator (https://external-secrets.io)
#   - HashiCorp Vault (https://developer.hashicorp.com/vault)
#   - Cloud provider secret managers (AWS Secrets Manager, GCP Secret Manager)
#
# The values below are examples ONLY:
#   DB_USER:     "jcc_user"  → amNjX3VzZXI=
#   DB_PASSWORD: "changeme"  → Y2hhbmdlbWU=

apiVersion: v1
kind: Secret
metadata:
  name: jcc-secrets
  namespace: jcc-production
  labels:
    app: jcc-backend
type: Opaque
data:
  DB_USER: amNjX3VzZXI=
  DB_PASSWORD: Y2hhbmdlbWU=
