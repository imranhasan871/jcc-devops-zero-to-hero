apiVersion: v1
kind: Namespace
metadata:
  name: jcc-dev
  labels:
    app: jcc
    environment: dev
---
# ResourceQuota limits resource consumption in the dev namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: jcc-dev
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "1Gi"
    limits.cpu: "2"
    limits.memory: "2Gi"
    pods: "10"
