apiVersion: v1
kind: Namespace
metadata:
  name: jcc-production
  labels:
    app: jcc
    environment: production
---
# ResourceQuota for production — higher limits
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: jcc-production
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "50"
---
# LimitRange sets default resource constraints for pods that don't specify their own
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: jcc-production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
