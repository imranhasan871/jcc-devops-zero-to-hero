apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jcc-backend-rolebinding
  namespace: jcc-production
  labels:
    app: jcc-backend
subjects:
  - kind: ServiceAccount
    name: jcc-backend
    namespace: jcc-production
roleRef:
  kind: Role
  name: jcc-backend-role
  apiGroup: rbac.authorization.k8s.io
