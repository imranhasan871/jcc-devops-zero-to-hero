kind: ClusterRoleBinding
metadata:
  name: jcc-cicd-rolebinding
  labels:
    app: jcc
    component: cicd
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: ClusterRole
  name: jcc-cicd-role
  apiGroup: rbac.authorization.k8s.io
