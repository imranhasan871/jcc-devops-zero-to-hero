apiVersion: v1
kind: ServiceAccount
metadata:
  name: jcc-backend
  namespace: jcc-production
  labels:
    app: jcc-backend
  annotations:
    # On EKS, annotate with an IAM role ARN for IRSA (IAM Roles for Service Accounts).
    # This lets the pod assume an AWS IAM role without storing credentials.
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/jcc-backend-role
automountServiceAccountToken: true
