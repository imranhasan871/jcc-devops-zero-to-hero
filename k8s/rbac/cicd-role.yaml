apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jcc-cicd-role
  labels:
    app: jcc
    component: cicd
rules:
  # Jenkins / GitHub Actions needs to deploy and monitor rollout status — nothing else.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
