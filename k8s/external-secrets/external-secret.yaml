# ExternalSecret defines WHAT to fetch and WHERE to store it as a K8s Secret.
# ESO creates and continuously syncs a native Kubernetes Secret from the SecretStore.
# The Secret is refreshed every hour — rotate in the backend and K8s picks it up
# within the refreshInterval without any manual intervention.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jcc-db-credentials
  namespace: jcc-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: jcc-secret-store
    kind: SecretStore
  target:
    name: jcc-db-secret           # name of the K8s Secret ESO will create/update
    creationPolicy: Owner         # deleting this ExternalSecret also deletes the K8s Secret
    template:
      type: Opaque
  data:
    - secretKey: db-password      # key in the resulting K8s Secret
      remoteRef:
        key: /jcc/production/db-password   # key in the secret store backend
    - secretKey: db-user
      remoteRef:
        key: /jcc/production/db-user
    - secretKey: db-name
      remoteRef:
        key: /jcc/production/db-name
