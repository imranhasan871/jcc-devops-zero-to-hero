# SecretStore defines WHERE secrets come from.
# This example uses the fake provider for local development and demo purposes.
# In production replace the provider block with one of:
#   AWS SSM Parameter Store:  provider: aws, service: ParameterStore
#   AWS Secrets Manager:      provider: aws, service: SecretsManager
#   GCP Secret Manager:       provider: gcpsm
#   HashiCorp Vault:          provider: vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: jcc-secret-store
  namespace: jcc-production
spec:
  provider:
    fake:
      data:
        - key: "/jcc/production/db-password"
          value: "REPLACE_ME_IN_PRODUCTION"
        - key: "/jcc/production/db-user"
          value: "jcc_user"
        - key: "/jcc/production/db-name"
          value: "jcc_production"
