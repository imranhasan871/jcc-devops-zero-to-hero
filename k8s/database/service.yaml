# Headless service for StatefulSet DNS — pods get stable DNS names:
# postgres-0.postgres-headless.jcc.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: jcc
  labels:
    app: jcc
    tier: database
spec:
  clusterIP: None   # headless — no virtual IP, DNS resolves to pod IPs directly
  selector:
    app: jcc
    tier: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Regular ClusterIP service for application connections
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: jcc
  labels:
    app: jcc
    tier: database
spec:
  selector:
    app: jcc
    tier: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
