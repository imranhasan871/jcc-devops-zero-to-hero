apiVersion: v1
kind: Service
metadata:
  name: {{ include "jcc.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "jcc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "jcc.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
