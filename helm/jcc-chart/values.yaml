# Default values for jcc chart.
# Override per environment: helm install -f values-production.yaml
# Override single values:   helm install --set image.tag=abc123

replicaCount: 2

image:
  repository: jcc-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: true
  host: jcc.local
  annotations:
    kubernetes.io/ingress.class: nginx

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

env:
  PORT: "3001"
  DB_HOST: "database-service"
  DB_PORT: "5432"
  NODE_ENV: "production"

namespace: jcc-production

configmap:
  frontendUrl: "http://jcc.local"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
