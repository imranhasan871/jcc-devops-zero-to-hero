version: '3.9'

# Run with: docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up
# Or just the monitoring stack: docker compose -f monitoring/docker-compose.monitoring.yml up
# Access Prometheus: http://localhost:9090
# Access Grafana:    http://localhost:3001 (admin / admin)

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: jcc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'   # keep 15 days of metrics
      - '--web.enable-lifecycle'               # allows POST /-/reload to reload config
    restart: unless-stopped
    networks:
      - monitoring
      - default   # allows prometheus to reach the backend service

  grafana:
    image: grafana/grafana:10.4.0
    container_name: jcc-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin   # change in production!
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/jcc-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/jcc-dashboard.json:ro
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: jcc-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
